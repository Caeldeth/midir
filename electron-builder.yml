appId: co.eris.midir
productName: Midir
icon: resources/midir.png
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  # The scaffold excludes above miss every other dev tree in the repo root, so
  # they are packaged into app.asar unless they are named here. `resources/**`
  # must survive — it is asarUnpack'd and holds splash.html and the icon.
  - '!{coverage,e2e,test-results,playwright-report,docs,scripts,.claude,.agents,.codex,.github}/*'
  - '!{CLAUDE.md,playwright.config.mjs,vitest.config.mjs}'
  - '!**/*.tsbuildinfo'
  - '!tsconfig*.json'
  # The addon's sources and build recipe are not needed at run time.
  - '!packages/da-pcap/src/**'
  - '!packages/da-pcap/binding.gyp'
  # node-gyp leaves about 11 MB of compiler intermediates beside the 205 KB
  # addon, and the addon is packaged twice. Only the .node file is loaded at
  # run time, so drop the rest.
  #
  # Every pattern here must stay negative. electron-builder replaces its
  # default include set as soon as one positive pattern appears, which drops
  # out/ and resources/ from the package.
  - '!**/da-pcap/build/Release/obj/**'
  - '!**/da-pcap/build/Release/*.{exp,iobj,ipdb,lib,pdb}'
  - '!**/da-pcap/build/*.{sln,gypi,vcxproj,filters}'
  - '!**/da-pcap/build/*.vcxproj.filters'
asarUnpack:
  - resources/**
  # A native module cannot be loaded from inside an asar archive.
  - node_modules/da-pcap/build/**
  - packages/da-pcap/build/**
win:
  executableName: midir
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
portable:
  artifactName: ${name}-${version}-portable.${ext}
mac:
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - universal
  notarize: true
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - deb
  maintainer: Caeldeth
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
publish:
  provider: github
  owner: Caeldeth
  repo: midir
npmRebuild: false
beforeBuild: npx @electron/rebuild -f -w da-pcap
